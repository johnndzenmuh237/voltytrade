<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Settings — Vaultex Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dashboard.css">
<link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>

<div class="dash-shell">
  <aside class="dash-sidebar">
    <a href="../index.html" class="nav-logo"><span class="mark">V</span><span>Admin</span></a>
    <nav class="dash-nav">
      <a href="index.html">⌂ <span class="label">Overview</span></a>
      <a href="users.html">◉ <span class="label">Users</span></a>
      <a href="kyc.html">⛉ <span class="label">KYC review</span></a>
      <a href="transactions.html">⇵ <span class="label">Transactions</span></a>
      <a href="markets.html">⌗ <span class="label">Markets</span></a>
      <a href="investments.html">◎ <span class="label">Investment plans</span></a>
      <a href="support.html">☎ <span class="label">Support tickets</span></a>
      <a href="settings.html" class="active">⚙ <span class="label">Platform settings</span></a>
    </nav>
  </aside>

  <main class="dash-main">
    <div class="dash-topbar">
      <div><h2 class="mb-0" style="font-size:1.5rem;">Platform settings</h2><p class="mb-0" style="font-size:.88rem;">Global configuration for the exchange.</p></div>
      <div class="dash-search"><span>⌕</span><input type="text" placeholder="Search..."></div>
    </div>

    
    <div class="widget" style="margin-bottom:24px;">
      <div class="widget-head"><h3>Maintenance</h3></div>
      <div class="security-row"><div><strong>Maintenance mode</strong><p class="mb-0" style="font-size:.85rem;">Disables trading and shows a banner to all users</p></div><div class="toggle"></div></div>
      <div class="security-row"><div><strong>New registrations</strong></div><div class="toggle on"></div></div>
    </div>
    <div class="widget">
      <div class="widget-head"><h3>Risk limits</h3></div>
      <div class="field"><label>Default daily withdrawal limit (unverified)</label><input type="text" value="$2,000"></div>
      <div class="field"><label>Default daily withdrawal limit (Level 2)</label><input type="text" value="$100,000"></div>
      <button class="btn btn-primary">Save settings</button>
    </div>
  </main>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/charts.js"></script>
<script src="../assets/js/dashboard.js"></script>
</body>
</html>
