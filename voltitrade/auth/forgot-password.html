<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaultex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>

<div class="auth-form-wrap" style="min-height:100vh;">
  <div class="auth-card text-center">
    <a href="../index.html" class="nav-logo" style="justify-content:center;margin-bottom:32px;"><span class="mark">V</span><span class="brand-name">Vaultex</span></a>
    
    <div class="feature-icon" style="margin:0 auto 18px;">✉</div>
    <h2>Forgot your password?</h2>
    <p>Enter the email on your account and we'll send a reset link.</p>
    <form id="forgot-form">
      <div id="form-error" class="field-hint" style="display:none;color:var(--coral);background:var(--coral-dim);padding:10px 14px;border-radius:8px;margin-bottom:18px;text-align:left;"></div>
      <div id="form-success" class="field-hint" style="display:none;color:var(--mint);background:var(--mint-dim);padding:10px 14px;border-radius:8px;margin-bottom:18px;text-align:left;"></div>
      <div class="field" style="text-align:left;">
        <label for="fp-email">Email address</label>
        <input type="email" id="fp-email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Send reset link</button>
    </form>
    <p style="margin-top:24px;font-size:.85rem;"><a href="login.html" style="color:var(--mint);">← Back to log in</a></p>

  </div>
</div>

<script src="../assets/js/main.js"></script>
<script>
document.getElementById('forgot-form').addEventListener('submit', function(e){
  e.preventDefault();
  // In production this calls a real POST /api/forgot-password endpoint
  // that emails a single-use reset token. Wired here to the UI only,
  // since sending real email requires your mail provider credentials.
  document.getElementById('form-success').style.display = 'block';
  document.getElementById('form-success').textContent = 'If an account exists for that email, a reset link is on its way.';
});
</script>
</body>
</html>
