<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaultex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>

<div class="auth-form-wrap" style="min-height:100vh;">
  <div class="auth-card text-center">
    <a href="../index.html" class="nav-logo" style="justify-content:center;margin-bottom:32px;"><span class="mark">V</span><span class="brand-name">Vaultex</span></a>
    
    <div class="feature-icon" style="margin:0 auto 18px;">⛉</div>
    <h2>Set a new password</h2>
    <p>Choose a strong password you haven't used before.</p>
    <form id="reset-form">
      <div id="form-error" class="field-hint" style="display:none;color:var(--coral);background:var(--coral-dim);padding:10px 14px;border-radius:8px;margin-bottom:18px;text-align:left;"></div>
      <div class="field" style="text-align:left;">
        <label for="rp-password">New password</label>
        <input type="password" id="rp-password" placeholder="At least 8 characters" minlength="8" required>
      </div>
      <div class="field" style="text-align:left;">
        <label for="rp-confirm">Confirm new password</label>
        <input type="password" id="rp-confirm" placeholder="Re-enter your new password" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Reset password</button>
    </form>

  </div>
</div>

<script src="../assets/js/main.js"></script>
<script>
document.getElementById('reset-form').addEventListener('submit', function(e){
  e.preventDefault();
  const pw = document.getElementById('rp-password').value;
  const confirm = document.getElementById('rp-confirm').value;
  const err = document.getElementById('form-error');
  if (pw !== confirm) {
    err.textContent = "Passwords don't match.";
    err.style.display = 'block';
    return;
  }
  // Production: POST the token from the URL query string + new password
  // to /api/reset-password, then redirect to login on success.
  window.location.href = 'login.html';
});
</script>
</body>
</html>
